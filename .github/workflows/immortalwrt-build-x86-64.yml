name: build-x86-64-immortalwrt-25.12.x
# 优化版：修正命名歧义，增加动态 Release 标签与详细固件特性展示

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择 ImmortalWrt 版本"
        required: false
        default: "25.12.0-rc1"
        type: choice
        options:
          - 25.12.0-rc1
      custom_router_ip:
        description: "设置路由器管理地址 (仅对多网口有效, 格式: 192.168.x.1)"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: '编译固件 RootFS 分区大小 (单位: MB)'
        required: true
        default: '1024'
      enable_store:
        description: "集成 iStore 应用商店"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "是否编译 Docker 引擎"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否预设 PPPoE 拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
        - 'yes'
        - 'no'
      pppoe_account:
        description: "宽带账号 (若启用 PPPoE 则必填)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用 PPPoE 则必填)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh

      - name: Generate build timestamp
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Save Custom Router IP into OpenWrt files
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"
          echo "✅ 管理地址已设置为: ${{ github.event.inputs.custom_router_ip }}"
      
      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            if [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]]; then
              echo "❌ 错误: 启用 PPPoE 时必须提供宽带账号和密码！"
              exit 1
            fi
            echo "✅ PPPoE 信息验证通过"
          fi
      
      - name: Enable Store integration
        run: |
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> ${{ github.workspace }}/shell/custom-packages.sh
            echo "✅ 已追加 luci-app-store 到预装列表"
          else
            echo "❎ 未启用 luci-app-store"
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          ROOTFS_SIZE="${{ github.event.inputs.rootfs_size }}"
          INCLUDE_DOCKER="${{ github.event.inputs.include_docker }}"
          LUCI_VERSION="${{ github.event.inputs.luci_version }}"
          
          echo "🚀 开始基于 $LUCI_VERSION 构建，RootFS 大小: ${ROOTFS_SIZE}MB"
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/x86-64/imm25.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e ROOTFS_SIZE=$ROOTFS_SIZE \
            -e INCLUDE_DOCKER=$INCLUDE_DOCKER \
            -e ENABLE_PPPOE=${{ inputs.enable_pppoe }} \
            -e PPPOE_ACCOUNT=${{ inputs.pppoe_account }} \
            -e PPPOE_PASSWORD=${{ inputs.pppoe_password }} \
            immortalwrt/imagebuilder:x86-64-openwrt-${LUCI_VERSION} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Generate Release Notes
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          # 🚀 ImmortalWrt x86-64 定制固件
          
          > 本固件由 GitHub Actions 自动构建
          
          ## 📡 路由器后台信息
          - 🏠 **后台地址**: \`${{ github.event.inputs.custom_router_ip }}\`
          - 👤 **用户名**: \`root\`
          - 🔑 **密码**: *(无，请登录后及时修改)*
          
          ## ⚙️ 固件特性
          - 💾 **RootFS 分区大小**: \`${{ github.event.inputs.rootfs_size }} MB\`
          - 🐳 **Docker 引擎**: $( [ "${{ github.event.inputs.include_docker }}" == "yes" ] && echo "✅ 已集成" || echo "❎ 未集成" )
          - 🛍️ **iStore 商店**: $( [ "${{ github.event.inputs.enable_store }}" == "true" ] && echo "✅ 已集成" || echo "❎ 未集成" )
          - 🌐 **拨号方式**: $( [ "${{ github.event.inputs.enable_pppoe }}" == "yes" ] && echo "📝 已预设 PPPoE 账号" || echo "🔌 默认 DHCP / 静态 IP" )
          
          <br>
          
          <a href="https://yishijie.gitlab.io/ziyuan">
            <img src="https://img.shields.io/badge/若下载慢可套用国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge"/>
          </a>
          EOF

      - name: Upload ImmortWrt as release assets
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: Build-${{ env.DATE }}
          name: ImmortalWrt x86-64 (${{ env.DATE }})
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
