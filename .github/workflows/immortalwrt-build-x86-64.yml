name: ImmortalWrt-build-x86-64

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择 ImmortalWrt 版本 (Auto 抓取最新稳定版/RC版)'
        required: false
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc1'
      custom_router_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string
      profile:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # 强制使用较新的 Node 环境以适配最新的 Actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: 🔍 解析版本号
        id: resolve_version
        run: |
          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            echo ">>> 正在自动抓取 Docker Hub 上最新的 ImmortalWrt 标签..."
            # 剔除 SNAPSHOT 和 纯数字开发版，允许 rc 版
            LATEST_TAG=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=x86-64-openwrt-" | jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -vE "^x86-64-openwrt-[0-9]+\.[0-9]+$" | head -n 1 | sed 's/x86-64-openwrt-//')
            
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
              echo "❌ 无法获取版本号，工作流中止。"
              exit 1
            fi
            echo "FINAL_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo "FINAL_VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          fi

      - name: Prepare Dirs and Scripts
        run: |
          mkdir -p ${{ github.workspace }}/bin
          mkdir -p ${{ github.workspace }}/files
          # 关键：确保 shell 脚本格式正确（去除 Windows 换行符）
          sed -i 's/\r$//' ${{ github.workspace }}/x86-64/ImmortalWrt-build-x86-64-build.sh
          chmod +x ${{ github.workspace }}/x86-64/ImmortalWrt-build-x86-64-build.sh

      - name: Run Docker ImageBuilder
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/x86-64/ImmortalWrt-build-x86-64-build.sh:/home/build/immortalwrt/build.sh" \
            -e ROOTFS_SIZE="${{ inputs.profile }}" \
            -e MANAGEMENT_IP="${{ inputs.custom_router_ip }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.FINAL_VERSION }} \
            /bin/bash /home/build/immortalwrt/build.sh

      - name: Create Info Doc
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 🌟 ImmortalWrt ${{ env.FINAL_VERSION }} 定制版
          
          - 🏠 **管理地址**: http://${{ inputs.custom_router_ip }}
          - 👤 **用户名**: root
          - 🔑 **密码**: (空)
          - 📦 **分区配置**: Kernel: 64MB | RootFS: ${{ inputs.profile }}MB
          - ⚙️ **核心集成**: OpenClash (Meta核心), Argon 主题
          - 🛡️ **底层优化**: 纯离线防崩注入, 单/多网口智能分配 (eth0为WAN)
          - 💾 **磁盘特性**: 首次开机自动挂载 sda3 (不破坏已有数据)
          EOF

      - name: Upload Release
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: "${{ env.FINAL_VERSION }}-Build-${{ github.run_id }}"
          name: "ImmortalWrt ${{ env.FINAL_VERSION }} [IP: ${{ inputs.custom_router_ip }} | ${{ inputs.profile }}MB]"
          body_path: "${{ github.workspace }}/router-info.md"
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
