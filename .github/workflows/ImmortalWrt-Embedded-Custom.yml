name: 🚀 ImmortalWrt-Embedded-Custom (非x86设备定制固件)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '1. 架构(Arch)* (如: ramips-mt7621)'
        required: true
        default: 'ramips-mt7621'
      device_profile:
        description: '2. 设备代号(Profile)* (如: jdcloud_re-sp-01b)'
        required: true
        default: 'jdcloud_re-sp-01b'
      brand:
        description: '3. 品牌 (选填，防砖双保险)'
        required: false
        default: ''
      build_mode:
        description: '4. 模式: Lite(丐版) / Extroot(智能U盘扩容) / Deluxe(豪华版)'
        required: true
        default: 'Deluxe'
        type: choice
        options:
          - 'Deluxe'
          - 'Extroot'
          - 'Lite'
      openwrt_version:
        description: '5. 选择主线版本'
        required: true
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '25.12.0-rc1'
          - '24.10.5'
          - '23.05.4'
          - '21.02.7'
      custom_router_ip:
        description: '6. 固件默认管理 IP'
        required: true
        default: '192.168.100.1'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 净化变量与解析版本
        id: vars
        run: |
          CLEAN_ARCH=$(echo "${{ inputs.arch }}" | xargs)
          CLEAN_PROFILE=$(echo "${{ inputs.device_profile }}" | xargs)
          CLEAN_BRAND=$(echo "${{ inputs.brand }}" | xargs)
          
          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            LATEST=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=${CLEAN_ARCH}-openwrt-" | \
              jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -E "[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$" | sort -V | tail -n 1 | sed "s/${CLEAN_ARCH}-openwrt-//")
            SELECTED_VER="${LATEST:-24.10.5}"
          else
            SELECTED_VER="${{ inputs.openwrt_version }}"
          fi
          
          echo "VERSION=$SELECTED_VER" >> $GITHUB_ENV
          echo "CLEAN_ARCH=$CLEAN_ARCH" >> $GITHUB_ENV
          echo "CLEAN_PROFILE=$CLEAN_PROFILE" >> $GITHUB_ENV
          echo "CLEAN_BRAND=$CLEAN_BRAND" >> $GITHUB_ENV

      - name: 🏗️ 执行 Docker 构建引擎
        run: |
          mkdir -p bin files
          SCRIPT_PATH="./.github/scripts/build_embedded.sh"
          [ -f "$SCRIPT_PATH" ] && sed -i 's/\r$//' "$SCRIPT_PATH"
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/.github/scripts/build_embedded.sh:/home/build/immortalwrt/build.sh" \
            -e MANAGEMENT_IP="${{ inputs.custom_router_ip }}" \
            -e TARGET_ARCH="${{ env.CLEAN_ARCH }}" \
            -e DEVICE_PROFILE="${{ env.CLEAN_PROFILE }}" \
            -e BRAND_INPUT="${{ env.CLEAN_BRAND }}" \
            -e BUILD_MODE="${{ inputs.build_mode }}" \
            immortalwrt/imagebuilder:${{ env.CLEAN_ARCH }}-openwrt-${{ env.VERSION }} \
            /bin/bash /home/build/immortalwrt/build.sh

      - name: 📦 发布 Release
        uses: softprops/action-gh-release@v2.4.1
        if: success()
        with:
          tag_name: "${{ env.CLEAN_PROFILE }}-${{ env.VERSION }}-${{ env.CLEAN_ARCH }}"
          body: |
            ## 🛠️ 构建详情
            - **内核架构**: ${{ env.CLEAN_ARCH }}
            - **设备代号**: ${{ env.CLEAN_PROFILE }}
            - **构建模式**: **${{ inputs.build_mode }}**
            - **固件版本**: ${{ env.VERSION }}
            - **管理网址**: http://${{ inputs.custom_router_ip }}
            
            > 💡 **Extroot 扩容模式说明**: 
            > 刷入后，请在路由器**通电开机前**插上 U 盘。系统会自动将其格式化为 ext4 并挂载为系统空间，随后会自动重启一次。重启后即可拥有 U 盘的无限空间！
          files: |
            bin/targets/*/*/*.bin
            bin/targets/*/*/*.img.gz
            bin/targets/*/*/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
