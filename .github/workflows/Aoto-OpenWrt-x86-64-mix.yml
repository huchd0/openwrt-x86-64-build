name: OpenWrt x86_64 mix智能自动编译发布

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MANAGEMENT_IP: '192.168.100.1' # 全局后台地址配置

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择版本 (留空或填 latest 自动抓取最新版)'
        required: false
        default: 'latest'
        type: string
  schedule:
    - cron: '0 0 * * *'

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🔍 检测官方与本地版本是否一致
        id: check_version
        run: |
          INPUT_VER="${{ inputs.openwrt_version }}"
          EVENT_NAME="${{ github.event_name }}"
          
          # 1. 获取官方最新稳定版号 (加入 Token 验证，防止 API 频率限制报错)
          OFFICIAL_LATEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/openwrt/openwrt/releases" | grep '"tag_name":' | grep -v 'rc' | head -n 1 | cut -d '"' -f 4 | sed 's/v//')
          
          # 2. 获取本地最后发布
          MY_LATEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases/latest" | grep '"name":' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || echo "0.0.0")

          echo "官方最新版本: $OFFICIAL_LATEST"
          echo "本地最后发布: $MY_LATEST"

          # 3. 智能判断逻辑
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "手动触发模式！强制执行编译。"
            echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
            if [ -z "$INPUT_VER" ] || [ "$INPUT_VER" == "latest" ]; then
              echo "OWRT_VERSION=$OFFICIAL_LATEST" >> $GITHUB_ENV
            else
              echo "OWRT_VERSION=$INPUT_VER" >> $GITHUB_ENV
            fi
          else
            echo "定时检查模式！"
            if [ "$OFFICIAL_LATEST" != "$MY_LATEST" ]; then
              echo "发现新版本！准备更新..."
              echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
              echo "OWRT_VERSION=$OFFICIAL_LATEST" >> $GITHUB_ENV
            else
              echo "版本一致，无需更新。任务终止。"
              echo "SHOULD_BUILD=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 安装编译依赖
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip bzip2 patch python3 findutils zstd

      - name: 下载并解压 ImageBuilder
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          wget -q https://downloads.openwrt.org/releases/${{ env.OWRT_VERSION }}/targets/x86/64/openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.zst
          tar -I zstd -xf openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.zst
          mv openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64 imagebuilder

      - name: 运行编译脚本
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        env:
          ROOTFS_SIZE: '1024'
          # MANAGEMENT_IP 从文件顶部的全局 env 读取，确保统一
        run: |
          # 🌟 核心防护：抹除 Windows 换行符
          sed -i 's/\r$//' build_mix.sh
          
          chmod +x build_mix.sh
          cp build_mix.sh imagebuilder/
          cd imagebuilder
          
          # 双重防护
          sed -i 's/\r$//' build_mix.sh
          
          ./build_mix.sh

      - name: 生成发布标签
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

      - name: 自动发布到 Releases
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: OpenWrt ${{ env.OWRT_VERSION }} 自动更新版
          files: imagebuilder/output-firmware/*
          body: |
            **🤖 OpenWrt 自动mix终极定制化固件**
            - **版本**: `${{ env.OWRT_VERSION }}`
            - **固件大小**: 1GB
            - **构建时间**: `${{ env.release_tag }}`
            - **管理 IP**: `${{ env.MANAGEMENT_IP }}`
            - **硬盘挂载**: 智能抓取 sda3 或 nvme0n1p3 动态绑定 (为 Docker 预留)
            - **核心**: 已内置 OpenClash Meta 核心与 Argon 主题
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
