name: 🔍 OP Arch & Profile Radar (设备号智能寻址雷达)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '1. 设备架构 (非必填。留空则全网盲搜)'
        required: false
        默认: ''
      brand:
        description: '2. 品牌 (支持中文别名)'
        required: false
        默认: ''
      model:
        description: '3. 型号/绰号 (支持中文别名)'
        required: false
        默认: ''
      openwrt_version:
        description: '4. 快捷选择主线版本'
        required: false
        默认: 'Auto'
        输入: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc1'
      custom_version:
        description: '5. 寻找失踪机型？请手填旧版本号 (如: 23.05.4。填写即无视上方选项)'
        required: false
        默认: ''

jobs:
  query:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 检出代码库 (拉取后台引擎脚本)
        uses: actions/checkout@v4

      - name: 🔍 解析目标时空与核心版本
        id: vars
        run: |
          # 优先级 1：如果手动输入了老版本，启动时光机强行接管！
          if [ -n "${{ inputs.custom_version }}" ]; then
            echo ">>> 启动时光机！强行跳转至历史版本: ${{ inputs.custom_version }}"
            echo "VERSION=${{ inputs.custom_version }}" >> $GITHUB_ENV
            
          # 优先级 2：自动追踪 Docker Hub 最新版 (附带防风控限流降级)
          elif [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            LATEST=$(curl -sL --max-time 5 "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100" | jq -r '.results[].name' 2>/dev/null | grep -v "SNAPSHOT" | grep -E "openwrt-[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$" | sed -E 's/.*openwrt-//' | sort -V | tail -n 1 || echo "24.10.5")
            [ -z "$LATEST" ] || [ "$LATEST" == "null" ] && LATEST="24.10.5"
            echo "VERSION=$LATEST" >> $GITHUB_ENV
            
          # 优先级 3：使用常规下拉菜单
          else
            echo "VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          fi

      - name: 📋 启动纯净后台引擎
        env:
          INPUT_ARCH: ${{ inputs.arch }}
          INPUT_BRAND: ${{ inputs.brand }}
          INPUT_MODEL: ${{ inputs.model }}
        run: |
          # 赋予后台脚本执行权限并启动
          chmod +x .github/scripts/query_engine.sh
          .github/scripts/query_engine.sh
