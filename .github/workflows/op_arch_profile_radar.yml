name: 🔍 OP Arch & Profile Radar (嵌入式设备寻址雷达)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '1. 设备架构 (非必填。留空则全网盲搜)'
        required: false
        default: ''
      brand:
        description: '2. 品牌 (支持中文别名)'
        required: false
        default: ''
      model:
        description: '3. 型号/绰号 (支持中文别名)'
        required: false
        default: ''
      openwrt_version:
        description: '4. 快捷选择主线版本'
        required: false
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc2'
      custom_version:
        description: '5. 寻找失踪机型？请手填旧版本号 (如: 23.05.4。填写无视上方)'
        required: false
        default: ''

jobs:
  query:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 检出代码库
        uses: actions/checkout@v4

      - name: 🔍 解析目标时空与核心版本
        id: vars
        run: |
          if [ -n "${{ inputs.custom_version }}" ]; then
            echo "VERSION=${{ inputs.custom_version }}" >> $GITHUB_ENV
          elif [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            LATEST=$(curl -sL --max-time 5 "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100" | jq -r '.results[].name' 2>/dev/null | grep -v "SNAPSHOT" | grep -E "openwrt-[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$" | sed -E 's/.*openwrt-//' | sort -V | tail -n 1 || echo "24.10.5")
            [ -z "$LATEST" ] || [ "$LATEST" == "null" ] && LATEST="24.10.5"
            echo "VERSION=$LATEST" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          fi

      - name: 📋 启动雷达与自动降级引擎
        env:
          RAW_INPUT_ARCH: ${{ inputs.arch }}
          INPUT_BRAND: ${{ inputs.brand }}
          INPUT_MODEL: ${{ inputs.model }}
        run: |
          chmod +x .github/scripts/OP_Arch_Profile_Radar.sh
          
          # 🛡️ 智能防撞墙：RC/Snapshot 版本强制清空架构走爬虫模式
          if [[ "$VERSION" == *"-rc"* ]] || [[ "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "⚠️ 检测到非正式版本 ($VERSION)，自动使用【全网网页盲搜】模式以防 Docker 镜像缺失。"
            export INPUT_ARCH=""
          else
            export INPUT_ARCH="$RAW_INPUT_ARCH"
          fi

          # 第一轮：执行常规扫描
          ./.github/scripts/OP_Arch_Profile_Radar.sh
          
          # 🔄 自动降级逻辑 (Fallback)：如果上一轮失败，且当前不是稳定版，自动切稳定版重试！
          STABLE_VER="24.10.5"
          if grep -q "❌ 匹配失败" $GITHUB_STEP_SUMMARY && [ "$VERSION" != "$STABLE_VER" ]; then
             echo -e "\n======================================================="
             echo "🔄 触发自动降级机制！当前版本 ($VERSION) 尚未完成全平台编译。"
             echo ">>> 正在自动切换至最稳底座: $STABLE_VER 进行重新寻址..."
             echo -e "=======================================================\n"
             
             # 写入摘要提示用户发生了降级
             {
               echo "---"
               echo "### 🔄 自动降级寻址"
               echo "> ⚠️ 您选择的 \`${VERSION}\` 似乎尚未编译您所需的架构。"
               echo "> 🤖 雷达已自动为您在稳定版 \`${STABLE_VER}\` 中执行了二次寻址："
             } >> $GITHUB_STEP_SUMMARY
             
             # 重新配置环境变量并跑第二轮
             export VERSION="$STABLE_VER"
             export INPUT_ARCH="" # 降级必须强行清空架构走爬虫最稳
             ./.github/scripts/OP_Arch_Profile_Radar.sh
          fi
