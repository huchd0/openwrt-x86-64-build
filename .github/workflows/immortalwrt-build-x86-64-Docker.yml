name: immortalwrt-build-x86-64-Docker

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择 ImmortalWrt 版本"
        required: false
        default: "25.12.0-rc1"
        type: choice
        options:
          - 25.12.0-rc1
      custom_router_ip:
        description: "设置路由器管理地址 (格式: 192.168.x.1)"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: '编译固件 RootFS 分区大小 (单位: MB)'
        required: true
        default: '1024'
      enable_store:
        description: "集成 iStore 应用商店"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "Docker"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "PPPOE宽带账号"
        required: false
      pppoe_password:
        description: "宽带密码(留空则默认为 DHCP 上网)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh

      - name: Generate build timestamp
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Save Custom Router IP into OpenWrt files
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"
          echo "✅ 管理地址文件已生成: ${{ github.event.inputs.custom_router_ip }}"
      
      - name: Check PPPoE Inputs (Graceful Fallback)
        run: |
          if [[ -n "${{ github.event.inputs.pppoe_account }}" && -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            echo "✅ 检测到完整的宽带账号和密码，将启用 PPPoE 自动拨号。"
          elif [[ -n "${{ github.event.inputs.pppoe_account }}" || -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            echo "⚠️ 提示: 宽带账号或密码未填全。变量将照常推送，但系统将安全回退至 DHCP 模式。"
          else
            echo "✅ 未检测到宽带配置，将默认使用 DHCP。"
          fi
      
      - name: Enable Store integration
        run: |
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> ${{ github.workspace }}/shell/custom-packages.sh
            echo "✅ 已追加 luci-app-store"
          else
            echo "❎ 未启用 luci-app-store"
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          ROOTFS_SIZE="${{ github.event.inputs.rootfs_size }}"
          INCLUDE_DOCKER="${{ github.event.inputs.include_docker }}"
          LUCI_VERSION="${{ github.event.inputs.luci_version }}"
          
          echo "🚀 开始基于 $LUCI_VERSION 构建，RootFS 大小: ${ROOTFS_SIZE}MB"
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e ROOTFS_SIZE=$ROOTFS_SIZE \
            -e INCLUDE_DOCKER=$INCLUDE_DOCKER \
            -e PPPOE_ACCOUNT="${{ github.event.inputs.pppoe_account }}" \
            -e PPPOE_PASSWORD="${{ github.event.inputs.pppoe_password }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${LUCI_VERSION} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Generate Smart Release Notes
        run: |
          DOCKER_STATUS="❎ 未集成"
          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            DOCKER_STATUS="✅ 已集成 (**包含全自动网络互通与防火墙转发规则**)"
          fi

          STORE_STATUS="❎ 未集成"
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            STORE_STATUS="✅ 已集成"
          fi

          # 智能判断网络状态文案 (加入降级提示)
          WAN_STATUS="🔌 DHCP / 静态 IP"
          PPPOE_NOTE="*(未启用自动拨号功能)*"
          if [[ -n "${{ github.event.inputs.pppoe_account }}" && -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            WAN_STATUS="📝 PPPoE (**开机全自动注入账号密码并拨号**)"
            PPPOE_NOTE="自动将你填写的宽带账号密码写入 WAN 口并拨号。"
          elif [[ -n "${{ github.event.inputs.pppoe_account }}" || -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            WAN_STATUS="🔌 DHCP / 静态 IP (**⚠️ 宽带配置不全，已放弃 PPPoE**)"
            PPPOE_NOTE="*(检测到不完整的宽带信息，防呆机制触发，已安全回退至 DHCP 模式)*"
          fi

          cat > ${{ github.workspace }}/router-info.md <<EOF
          # 🚀 ImmortalWrt x86-64 高级定制固件
          
          > 本固件由 GitHub Actions 驱动 \`ImageBuilder\` 全自动构建，专为 x86-64 物理机与虚拟机优化。
          
          ## 📡 路由器后台与网络
          - 🏠 **管理地址**: \`${{ github.event.inputs.custom_router_ip }}\`
          - 👤 **默认账户**: \`root\`
          - 🔑 **默认密码**: *(无，请在初始设置时修改)*
          - 🌐 **上网方式**: $WAN_STATUS
          
          ## ⚙️ 核心固件特性
          - 💾 **RootFS 分区大小**: \`${{ github.event.inputs.rootfs_size }} MB\`
          - 🐳 **Docker 引擎**: $DOCKER_STATUS
          - 🛍️ **iStore 商店**: $STORE_STATUS
          - 🛡️ **科学插件**: 已预置 \`luci-app-openclash\` 及对应的 Meta 内核。
          
          ## 💡 开机自动化说明 (无痕部署)
          本固件内置了 \`99-init-settings\` 启动脚本，**首次开机时会自动执行以下操作，并在执行完毕后自我销毁**，保持系统纯净：
          1. 自动绑定指定的 LAN 口 IP。
          2. $PPPOE_NOTE
          3. $( [ "${{ github.event.inputs.include_docker }}" == "yes" ] && echo "自动注册 Docker 虚拟网卡，并在防火墙中打通 LAN与Docker 的双向访问、允许 Docker 容器直连外网拉取镜像。" || echo "*(未启用 Docker 自动化配置)*" )

          ---
          <div align="center">
            <a href="https://yishijie.gitlab.io/ziyuan">
              <img src="https://img.shields.io/badge/若下载慢可套用国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge"/>
            </a>
          </div>
          EOF

      - name: Upload ImmortWrt as release assets
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: Build-${{ env.DATE }}
          name: 🚀 ImmortalWrt x86-64 (构建于 ${{ env.DATE }})
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
