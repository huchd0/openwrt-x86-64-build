name: immortalwrt-build-x86-64-Docker

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择 ImmortalWrt 版本 (Auto 抓取最新稳定版/RC版)"
        required: false
        default: "Auto"
        type: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc1'
      custom_router_ip:
        description: "设置路由器管理地址 (默认: 192.168.100.1)"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: '编译固件 RootFS 分区大小 (单位: MB，建议 1024 以上)'
        required: true
        default: '1024'
      include_docker:
        description: "集成 Docker 及网络互通环境"
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "PPPOE 宽带账号 (可选)"
        required: false
      pppoe_password:
        description: "宽带密码 (留空则默认为 DHCP 上网)"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh

      - name: Generate build timestamp
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: 🔍 解析 Auto 版本号
        id: resolve_version
        run: |
          if [ "${{ github.event.inputs.luci_version }}" == "Auto" ]; then
            echo ">>> 正在自动抓取 Docker Hub 上最新的 ImmortalWrt 镜像标签..."
            
            # 过滤 SNAPSHOT 和纯开发版(如25.12)，精确保留 RC 版和稳定版
            LATEST_TAG=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=x86-64-openwrt-" | jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -vE "^x86-64-openwrt-[0-9]+\.[0-9]+$" | head -n 1 | sed 's/x86-64-openwrt-//')
            
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
              echo "❌ 致命错误：未能从 Docker Hub 获取到有效的版本号！工作流中止。"
              exit 1
            fi
            
            echo ">>> 🎉 成功锁定最终构建版本: $LATEST_TAG"
            echo "FINAL_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo ">>> 用户手动指定了版本: ${{ github.event.inputs.luci_version }}"
            echo "FINAL_VERSION=${{ github.event.inputs.luci_version }}" >> $GITHUB_ENV
          fi

      - name: Save Custom Router IP into OpenWrt files
        run: |
          mkdir -p "${{ github.workspace }}/files/etc/config"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/files/etc/config/custom_router_ip.txt"
          echo "✅ 管理地址文件已生成: ${{ github.event.inputs.custom_router_ip }}"
      
      - name: Check PPPoE Inputs (Graceful Fallback)
        run: |
          if [[ -n "${{ github.event.inputs.pppoe_account }}" && -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            echo "✅ 检测到完整的宽带账号和密码，将启用 PPPoE 自动拨号。"
          elif [[ -n "${{ github.event.inputs.pppoe_account }}" || -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            echo "⚠️ 提示: 宽带账号或密码未填全。系统将安全回退至 DHCP 模式。"
          else
            echo "✅ 未检测到宽带配置，将默认使用 DHCP。"
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          ROOTFS_SIZE="${{ github.event.inputs.rootfs_size }}"
          INCLUDE_DOCKER="${{ github.event.inputs.include_docker }}"
          LUCI_VERSION="${{ env.FINAL_VERSION }}"
          
          echo "🚀 开始基于 $LUCI_VERSION 构建，RootFS 大小: ${ROOTFS_SIZE}MB"
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e ROOTFS_SIZE=$ROOTFS_SIZE \
            -e INCLUDE_DOCKER=$INCLUDE_DOCKER \
            -e PPPOE_ACCOUNT="${{ github.event.inputs.pppoe_account }}" \
            -e PPPOE_PASSWORD="${{ github.event.inputs.pppoe_password }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${LUCI_VERSION} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Generate Smart Release Notes
        run: |
          DOCKER_STATUS="❎ 未集成"
          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            DOCKER_STATUS="✅ 已集成 (**包含全自动网络互通与防火墙转发规则**)"
          fi

          WAN_STATUS="🔌 DHCP / 静态 IP"
          PPPOE_NOTE="*(未启用自动拨号功能)*"
          if [[ -n "${{ github.event.inputs.pppoe_account }}" && -n "${{ github.event.inputs.pppoe_password }}" ]]; then
            WAN_STATUS="📝 PPPoE (**开机全自动注入账号密码并拨号**)"
            PPPOE_NOTE="自动将你填写的宽带账号密码写入 WAN 口并拨号。"
          elif [[ -n "${{ github.event.inputs.pppoe_account }}" || -n
