name: build-x86-64-immortalwrt-auto

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择版本 (auto 自动构建最新稳定版)"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - 25.12.0-rc1
          - 24.10.5
      custom_router_ip:
        description: "路由器 LAN 口管理地址"
        required: true
        default: "192.168.100.1"
      profile:
        description: '固件分区大小 (MB)'
        required: true
        default: '1024'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai
      
    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 获取最新稳定版标签
        id: get_tag
        run: |
          if [ "${{ github.event.inputs.luci_version }}" = "auto" ]; then
            echo "正在检索 Docker Hub 以查找最新稳定版本..."
            
            # 优化点 1：通过 name 过滤，只向 Docker Hub 索要 x86-64 相关的镜像，防止被其他架构刷屏
            API_URL="https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags/?page_size=100&name=x86-64-openwrt-"
            
            # 获取数据并过滤出纯数字结尾的稳定版 (例如 23.05.4, 24.10.5)
            LATEST_TAG=$(curl -s "$API_URL" | \
              jq -r '.results[].name' | \
              grep -E '^x86-64-openwrt-[0-9]+\.[0-9]+\.[0-9]+$' | \
              sort -V | tail -n 1)
            
            # 优化点 2：如果还是没找到，打印出找到的所有 x86 标签供排查，不再“死得不明不白”
            if [ -z "$LATEST_TAG" ]; then
              echo "❌ 未找到符合正则条件的稳定版标签！下面输出拉取到的原始标签列表供排查："
              curl -s "$API_URL" | jq -r '.results[].name' | grep 'x86-64'
              exit 1
            fi
            
            FINAL_VERSION=$(echo $LATEST_TAG | sed 's/x86-64-openwrt-//')
          else
            FINAL_VERSION="${{ github.event.inputs.luci_version }}"
          fi
          
          echo "确定使用的版本为: $FINAL_VERSION"
          echo "LUCI_VERSION=$FINAL_VERSION" >> $GITHUB_ENV

      - name: 设置脚本执行权限
        run: chmod +x ${{ github.workspace }}/x86-64/build25.sh

      - name: 构建 ImmortalWrt 固件
        run: |
          echo "🚀 开始构建，版本: ${{ env.LUCI_VERSION }}，分区: ${{ inputs.profile }}MB"
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/x86-64/imm25.config:/home/build/immortalwrt/.config" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/build25.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="${{ inputs.profile }}" \
            -e CUSTOM_ROUTER_IP="${{ inputs.custom_router_ip }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.LUCI_VERSION }} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: 生成发布信息
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 📡 路由器编译完成
          - 📦 **固件版本**: ImmortalWrt ${{ env.LUCI_VERSION }}
          - 🏠 **后台地址**: \`${{ inputs.custom_router_ip }}\`
          - 👤 **用户名**: \`root\`
          - 🔑 **密码**: \`无\`
          EOF

      - name: 上传发布资产
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: Autobuild-${{ env.LUCI_VERSION }}
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
