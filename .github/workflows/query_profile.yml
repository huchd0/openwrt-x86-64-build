name: 🔍 Query Device Profile (全网智能查询引擎)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '1. 设备架构 (非必填。留空则跨全架构检索)'
        required: false
        default: ''
      brand:
        description: '2. 品牌 (非必填。支持中文别名)'
        required: false
        default: ''
      model:
        description: '3. 型号/绰号 (非必填。支持中文别名)'
        required: false
        default: ''
      openwrt_version:
        description: '选择版本 (Auto 将自动追踪最新版)'
        required: false
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc1'

jobs:
  query:
    runs-on: ubuntu-22.04
    steps:
      - name: 🔍 解析核心版本
        id: vars
        run: |
          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            # 精准抓取 Docker Hub 上当前最新的稳定版版本号
            LATEST=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100" | jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -E "openwrt-[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$" | sed -E 's/.*openwrt-//' | sort -V | tail -n 1)
            [ -z "$LATEST" ] || [ "$LATEST" == "null" ] && LATEST="24.10.5"
            echo "VERSION=$LATEST" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          fi

      - name: 📋 启动云端 API 跨架构智能匹配
        run: |
          echo ">>> 目标环境版本: ${{ env.VERSION }}"
          echo -e "=======================================================\n"
          
          # ==========================================
          # 📝 1. 净化与【三填一】防呆逻辑
          # ==========================================
          trim() {
            local s="$1"
            s="${s#"${s%%[![:space:]]*}"}"
            s="${s%"${s##*[![:space:]]}"}"
            echo "$s"
          }

          RAW_ARCH=$(trim "${{ inputs.arch }}")
          RAW_BRAND=$(trim "${{ inputs.brand }}")
          RAW_MODEL=$(trim "${{ inputs.model }}")
          
          if [ -z "$RAW_ARCH" ] && [ -z "$RAW_BRAND" ] && [ -z "$RAW_MODEL" ]; then
             echo "❌ 触发防呆拦截：架构、品牌、型号不能全部为空！"
             echo "💡 请至少填写一项线索（执行“三填一”底线规则）。"
             exit 1
          fi
          
          # ==========================================
          # 📝 2. 品牌与型号双字典配置
          # ==========================================
          BRAND_DICT="
          小米|mi               (xiaomi)
          红米                  (redmi)
          华硕|败家之眼|asus    (asus)
          普联|tp|tplink        (tplink|tp-link)
          网件|netgear          (netgear)
          领势|linksys          (linksys)
          腾达|tenda            (tenda)
          水星|mercury          (mercury)
          中兴|zte              (zte)
          华为|huawei           (huawei)
          友讯|dlink            (dlink)
          华三|h3c              (h3c)
          锐捷|ruijie           (ruijie)
          京东云|jd|无线宝      (jdcloud)
          斐讯|phicomm          (phicomm)
          新路由|newifi|dteam   (newifi|d-team)
          极路由|hiwifi         (hiwifi)
          奇虎|360              (qihoo)
          移动|中国移动|cmcc    (cmcc)
          捷稀|jcg              (jcg)
          广和通|glinet|gl      (glinet)
          友善|nanopi|friendlyarm (friendlyarm)
          迅雷|网心云|赚钱宝    (xunlei|onething|thunder)
          "
          
          MODEL_DICT="
          一代|1代|cp01         (re-cp-01)
          二代|2代|sp01b        (re-sp-01b)
          亚瑟|ax1800pro        (ax1800-pro)
          雅典娜|ax6600         (ax6600)
          百里                  (ax6000)
          鲁班|cl01             (re-cl-01)
          k2|k2经典             (k2)
          k2p|k2p神机           (k2p)
          k3|k3路由器           (k3)
          k3c                   (k3c)
          cr6606|cr6608|cr6609  (cr660x)
          wr30u|联通wr30u       (wr30u)
          ax3000t               (ax3000t)
          ax3600                (ax3600)
          ax9000                (ax9000)
          新路由1|y1|mini       (y1)
          新路由2|d1            (d1)
          新路由3|d2|newifi3    (d2)
          r2s                   (nanopi-r2s)
          r4s                   (nanopi-r4s)
          r5s                   (nanopi-r5s)
          r5c                   (nanopi-r5c)
          r6s                   (nanopi-r6s)
          t7|360t7              (t7)
          q20|捷稀q20           (q20)
          rax3000m|移动rax3000m (rax3000m)
          e8820s|中兴e8820s     (e8820s)
          "
          
          # ==========================================
          # ⚙️ 3. 核心翻译引擎 (套娃免疫版)
          # ==========================================
          translate() {
            local input="$1"
            local dict="$2"
            local output=""
            
            # 将用户的输入按空格拆词，逐个击破
            for word in $input; do
              local matched=0
              while IFS= read -r line; do
                [[ ! "$line" =~ [^[:space:]] ]] && continue
                local target="(${line##*(}"
                local aliases_str="${line%(*}"
                
                IFS='|' read -ra ALIAS_ARRAY <<< "$aliases_str"
                for raw_alias in "${ALIAS_ARRAY[@]}"; do
                  local clean_alias=$(trim "$raw_alias")
                  
                  # 只做精确的整词匹配，命中后立刻收手跳出
                  if [ "$word" == "$clean_alias" ]; then
                    output="$output $target"
                    matched=1
                    break 2
                  fi
                done
              done <<< "$dict"
              
              # 没命中字典的词，原样保留
              if [ $matched -eq 0 ]; then
                output="$output $word"
              fi
            done
            echo $(trim "$output")
          }

          PARSED_BRAND=$(translate "$RAW_BRAND" "$BRAND_DICT")
          PARSED_MODEL=$(translate "$RAW_MODEL" "$MODEL_DICT")
          
          QUERY_B="${PARSED_BRAND// /.*}"
          QUERY_M="${PARSED_MODEL// /.*}"

          echo "🔍 引擎启动状态："
          [ -n "$RAW_ARCH" ] && echo "   - 扫描范围: [特定架构 -> $RAW_ARCH]" || echo "   - 扫描范围: [全局跨架构云端盲搜]"
          [ -n "$QUERY_B" ] && echo "   - 品牌锁定: [$QUERY_B]"
          [ -n "$QUERY_M" ] && echo "   - 型号锁定: [$QUERY_M]"
          echo -e "-------------------------------------------------------\n"

          # ==========================================
          # 🚀 4. API 架构动态提取
          # ==========================================
          if [ -z "$RAW_ARCH" ]; then
            echo ">>> 正在连接云端，动态抓取全网架构节点池..."
            ARCH_LIST=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=openwrt-${VERSION}" | jq -r '.results[].name' | grep -E "\-openwrt-${VERSION}$" | sed "s/-openwrt-${VERSION}$//")
            
            if [ -z "$ARCH_LIST" ]; then
                echo "❌ 无法获取架构列表。请稍后重试。"
                exit 1
            fi
            echo ">>> 成功锁定 $(echo "$ARCH_LIST" | wc -w) 个独立架构，开始极速遍历..."
          else
            ARCH_LIST="$RAW_ARCH"
          fi

          ALL_LIST=""
          for arch in $ARCH_LIST; do
            subpath=$(echo "$arch" | sed 's/-/\//')
            URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${subpath}/profiles.json"
            PROFILES=$(curl -sL --max-time 3 "$URL" | jq -r '.profiles | keys[]' 2>/dev/null || true)
            if [ -n "$PROFILES" ]; then
                for p in $PROFILES; do
                    ALL_LIST="$ALL_LIST\n$arch : $p"
                done
            fi
          done
          ALL_LIST=$(echo -e "$ALL_LIST" | grep -v "^$")

          # ==========================================
          # 🎯 5. 双重交叉过滤 (防暴毙版)
          # ==========================================
          RESULT="$ALL_LIST"
          [ -n "$QUERY_B" ] && RESULT=$(echo "$RESULT" | grep -iE "$QUERY_B" || true)
          [ -n "$QUERY_M" ] && RESULT=$(echo "$RESULT" | grep -iE "$QUERY_M" || true)

          if [ -z "$RESULT" ]; then
            echo "❌ 匹配失败：在云端数据库中未找到符合条件的设备。"
            echo "💡 建议检查拼写，或尝试留空一个搜索框扩大检索范围。"
          else
            echo "✅ 匹配成功！以下是可供编译的精确组合："
            echo -e "======================================================="
            echo "$RESULT" | awk -F ':' '{printf "%-25s : %s\n", $1, $2}'
            echo -e "======================================================="
            echo "👆 请将冒号左侧填入主编译脚本的 Arch，右侧填入 Device Profile。"
          fi
