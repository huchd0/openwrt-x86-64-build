name: ImmortalWrt-x86-64-mix

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择 ImmortalWrt 版本 (Auto 为自动拉取最新版)'
        required: true
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '25.12.0-rc1'
          - '24.10.5'
      profile:
        description: 'RootFS 分区大小 (单位: MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🌟 智能获取版本号
        id: get_version
        run: |
          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            echo "正在查询 ImmortalWrt 最新稳定版或 RC 版..."
            # 获取最新 release 标签，过滤掉没有 tag 的空行
            LATEST_VER=$(curl -s "https://api.github.com/repos/immortalwrt/immortalwrt/releases" | jq -r '.[0].tag_name' | sed 's/v//')
            if [ -z "$LATEST_VER" ] || [ "$LATEST_VER" == "null" ]; then
              echo "API 抓取失败，回退到默认版本 24.10.5"
              LATEST_VER="24.10.5"
            fi
            echo "🎉 自动获取到最新版本: $LATEST_VER"
            echo "OWRT_VERSION=$LATEST_VER" >> $GITHUB_ENV
          else
            echo "OWRT_VERSION=${{ inputs.openwrt_version }}" >> $GITHUB_ENV
          fi

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip bzip2 patch python3 findutils zstd jq

      - name: 下载并解压 ImageBuilder
        run: |
          # 动态拼接并检测下载地址
          IB_URL="https://downloads.immortalwrt.org/releases/${{ env.OWRT_VERSION }}/targets/x86/64/immortalwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.xz"
          echo ">>> 正在尝试下载: $IB_URL"
          
          if wget --spider -q "$IB_URL"; then
            wget -q "$IB_URL"
            tar -xf *.tar.xz
            mv immortalwrt-imagebuilder-* imagebuilder
          else
            echo "❌ 错误：版本 ${{ env.OWRT_VERSION }} 的下载地址不存在！"
            echo "请确认该版本是否有 ImageBuilder 释出。"
            exit 1
          fi

      - name: 运行定制脚本
        env:
          ROOTFS_SIZE: ${{ inputs.profile }}
          MANAGEMENT_IP: ${{ inputs.custom_ip }}
        run: |
          sed -i 's/\r$//' x86-64/build251.sh
          chmod +x x86-64/build251.sh
          cp x86-64/build251.sh imagebuilder/
          cd imagebuilder
          ./build251.sh

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.OWRT_VERSION }}-${{ github.run_id }}
          name: ImmortalWrt ${{ env.OWRT_VERSION }} [${{ inputs.custom_ip }}]
          files: imagebuilder/output-firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
