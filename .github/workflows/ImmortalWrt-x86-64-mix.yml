name: ImmortalWrt-x86-64-mix

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "选择 ImmortalWrt 版本 (Docker Tag)"
        required: false
        default: "25.12.0-rc1" 
        type: choice
        options:
          - 25.12.0-rc1
          - 24.10.5
          - 23.05.4
      custom_router_ip:
        description: "路由器管理地址 (如 192.168.100.1)"
        required: true
        default: "192.168.100.1"
      profile:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: 🛠️ 准备映射目录与权限
        run: |
          mkdir -p ${{ github.workspace }}/bin
          mkdir -p ${{ github.workspace }}/files
          sed -i 's/\r$//' ${{ github.workspace }}/x86-64/build_ImmortalWrt_mix.sh
          chmod +x ${{ github.workspace }}/x86-64/build_ImmortalWrt_mix.sh

      - name: 🚀 运行 Docker 编译 (通过 Volume 实时传出固件)
        run: |
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/builder/bin" \
            -v "${{ github.workspace }}/files:/builder/files" \
            -v "${{ github.workspace }}/x86-64/build_ImmortalWrt_mix.sh:/builder/build.sh" \
            -e ROOTFS_SIZE="${{ inputs.profile }}" \
            -e MANAGEMENT_IP="${{ inputs.custom_router_ip }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ inputs.openwrt_version }} \
            /bin/bash /builder/build.sh

      - name: 📝 生成后台说明文档
        run: |
          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 🌟 ImmortalWrt ${{ inputs.openwrt_version }} 定制版
          
          - 🏠 **管理地址**: http://${{ inputs.custom_router_ip }}
          - 👤 **用户名**: root
          - 🔑 **密码**: (空)
          - ⚙️ **核心集成**: OpenClash (Meta核心), Argon 主题
          - 💾 **特性**: 开机自动抓取并挂载剩余空间 (sda3)
          EOF

      - name: 📦 Upload Release
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: ${{ inputs.openwrt_version }}-Mix-${{ github.run_id }}
          name: ImmortalWrt ${{ inputs.openwrt_version }} [IP: ${{ inputs.custom_router_ip }}]
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*squashfs-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
