name: ImmortalWrt-x86-64-mix

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择版本 (Auto 自动抓取稳定版)'
        required: true
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '24.10.0'
          - '23.05.4'
          - '23.05.3'
      profile:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🔍 智能探测可用下载地址
        id: probe_url
        run: |
          # 定义备用版本（如果 Auto 失败，回退到此）
          FALLBACK_VER="23.05.4"
          
          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            VERSION=$(curl -s "https://api.github.com/repos/immortalwrt/immortalwrt/releases" | jq -r '.[0].tag_name' | sed 's/v//')
          else
            VERSION="${{ inputs.openwrt_version }}"
          fi

          echo "正在检测版本: $VERSION"

          # 定义检测函数
          check_url() {
            local ver=$1
            local url="https://downloads.immortalwrt.org/releases/${ver}/targets/x86/64/immortalwrt-imagebuilder-${ver}-x86-64.Linux-x86_64.tar.xz"
            if wget --spider -q "$url"; then
              echo "$url"
            else
              echo ""
            fi
          }

          # 尝试下载
          IB_URL=$(check_url "$VERSION")

          if [ -z "$IB_URL" ]; then
            echo "⚠️ 警告: $VERSION 暂时没有 ImageBuilder 文件，正在尝试回退到稳定版 $FALLBACK_VER"
            IB_URL=$(check_url "$FALLBACK_VER")
            VERSION="$FALLBACK_VER"
          fi

          if [ -n "$IB_URL" ]; then
            echo "✅ 最终确定下载地址: $IB_URL"
            echo "IB_URL=$IB_URL" >> $GITHUB_ENV
            echo "OWRT_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "❌ 严重错误: 连回退版本也无法下载！请检查网络或官方站点。"
            exit 1
          fi

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y build-essential gawk git wget unzip python3 jq

      - name: 下载并解压
        run: |
          wget -q "${{ env.IB_URL }}"
          tar -xf *.tar.xz
          mv immortalwrt-imagebuilder-* imagebuilder

      - name: 运行定制脚本
        env:
          ROOTFS_SIZE: ${{ inputs.profile }}
          MANAGEMENT_IP: ${{ inputs.custom_ip }}
        run: |
          sed -i 's/\r$//' x86-64/build251.sh
          chmod +x x86-64/build251.sh
          cp x86-64/build251.sh imagebuilder/
          cd imagebuilder
          ./build251.sh

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.OWRT_VERSION }}-${{ github.run_id }}
          name: ImmortalWrt ${{ env.OWRT_VERSION }} [${{ inputs.custom_ip }}]
          files: imagebuilder/output-firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
