name: ImmortalWrt-x86-64-mix

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择版本 (Auto 自动抓取最新)'
        required: true
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '25.12.0-rc1'
          - '24.10.5'
      profile:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🌟 智能版本号解析与路径探测
        id: probe_url
        run: |
          # 1. 确定基础版本号
          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            VERSION=$(curl -s "https://api.github.com/repos/immortalwrt/immortalwrt/releases" | jq -r '.[0].tag_name' | sed 's/v//')
          else
            VERSION="${{ inputs.openwrt_version }}"
          fi
          
          echo "目标版本: $VERSION"

          # 2. 构造可能的下载 URL 列表 (有些 RC 版在路径里不带 -rc1)
          URL_1="https://downloads.immortalwrt.org/releases/${VERSION}/targets/x86/64/immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64.tar.xz"
          VERSION_SHORT=$(echo $VERSION | cut -d'-' -f1)
          URL_2="https://downloads.immortalwrt.org/releases/${VERSION}/targets/x86/64/immortalwrt-imagebuilder-${VERSION_SHORT}-x86-64.Linux-x86_64.tar.xz"
          
          # 3. 探测合法的 URL
          SELECTED_URL=""
          if wget --spider -q "$URL_1"; then
            SELECTED_URL="$URL_1"
          elif wget --spider -q "$URL_2"; then
            SELECTED_URL="$URL_2"
          fi

          if [ -n "$SELECTED_URL" ]; then
            echo "✅ 找到有效下载地址: $SELECTED_URL"
            echo "IB_URL=$SELECTED_URL" >> $GITHUB_ENV
            echo "OWRT_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "❌ 严重错误: 无法在官方下载站找到 $VERSION 的 ImageBuilder 文件！"
            echo "请访问 https://downloads.immortalwrt.org/releases/ 确认版本号是否存在。"
            exit 1
          fi

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip bzip2 patch python3 findutils zstd jq

      - name: 下载并解压 ImageBuilder
        run: |
          wget -q "${{ env.IB_URL }}"
          tar -xf *.tar.xz
          mv immortalwrt-imagebuilder-* imagebuilder

      - name: 运行定制脚本
        env:
          ROOTFS_SIZE: ${{ inputs.profile }}
          MANAGEMENT_IP: ${{ inputs.custom_ip }}
        run: |
          sed -i 's/\r$//' x86-64/build251.sh
          chmod +x x86-64/build251.sh
          cp x86-64/build251.sh imagebuilder/
          cd imagebuilder
          ./build251.sh

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.OWRT_VERSION }}-${{ github.run_id }}
          name: ImmortalWrt ${{ env.OWRT_VERSION }} [${{ inputs.custom_ip }}]
          files: imagebuilder/output-firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
