name: ImmortalWrt-x86-64-mix

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: '选择构建版本 (Docker Tag)'
        required: true
        default: '25.12.0-rc1'
        type: choice
        options:
          - '25.12.0-rc1'
          - '24.10.5'
          - '23.05.4'
      profile:
        description: 'RootFS 分区大小 (MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址'
        required: true
        default: '192.168.100.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🐳 准备 Docker 构建目录
        run: |
          # 创建用于接收编译结果的宿主机文件夹
          mkdir -p output-firmware
          
          # 修复脚本换行符并赋予权限
          sed -i 's/\r$//' x86-64/build_ImmortalWrt_mix.sh
          chmod +x x86-64/build_ImmortalWrt_mix.sh

      - name: 🚀 运行 Docker ImageBuilder 容器
        run: |
          DOCKER_IMAGE="immortalwrt/imagebuilder:x86-64-openwrt-${{ inputs.openwrt_version }}"
          echo ">>> 正在拉取官方构建镜像: $DOCKER_IMAGE"
          docker pull "$DOCKER_IMAGE"
          
          echo ">>> 启动容器并在无尘环境中执行编译..."
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e ROOTFS_SIZE=${{ inputs.profile }} \
            -e MANAGEMENT_IP=${{ inputs.custom_ip }} \
            "$DOCKER_IMAGE" \
            /bin/bash -c "cp /workspace/x86-64/build_ImmortalWrt_mix.sh . && \
            ./build_ImmortalWrt_mix.sh && \
            echo '>>> 编译完成，正在列出生成的文件清单：' && \
            ls -lh bin/targets/x86/64/ && \
            cp bin/targets/x86/64/*.img.gz /workspace/output-firmware/ 2>/dev/null || true && \
            cp bin/targets/x86/64/sha256sums /workspace/output-firmware/ 2>/dev/null || true"

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.openwrt_version }}-${{ github.run_id }}
          name: ImmortalWrt ${{ inputs.openwrt_version }} [${{ inputs.custom_ip }}]
          files: output-firmware/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
