name: 🚀 Embedded-Custom-ImmortalWrt (非x86设备定制固件)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '1. 架构或芯片* (如: mt7981, ramips-mt7621)'
        required: true
        default: 'ramips-mt7621'
      device_profile:
        description: '2. 设备代号(Profile)* (如: jdcloud_re-sp-01b)'
        required: true
        default: 'jdcloud_re-sp-01b'
      brand:
        description: '3. 品牌 (选填，防砖双保险)'
        required: false
        default: ''
      build_mode:
        description: '4. 模式: Lite(丐版) / Extroot(智能U盘扩容) / Deluxe(豪华版)'
        required: true
        default: 'Deluxe'
        type: choice
        options:
          - 'Deluxe'
          - 'Extroot'
          - 'Lite'
      openwrt_version:
        description: '5. 选择主线版本'
        required: true
        default: 'Auto'
        type: choice
        options:
          - 'Auto'
          - '25.12.0-rc1'
          - '24.10.5'
          - '23.05.4'
          - '21.02.7'
      custom_router_ip:
        description: '6. 固件默认管理 IP'
        required: true
        default: '192.168.100.1'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 智能解析架构与版本 (芯片特征推导)
        id: vars
        run: |
          RAW_ARCH=$(echo "${{ inputs.arch }}" | xargs | tr '[:upper:]' '[:lower:]')
          CLEAN_PROFILE=$(echo "${{ inputs.device_profile }}" | xargs)
          CLEAN_BRAND=$(echo "${{ inputs.brand }}" | xargs)
          
          # ==========================================
          # 🧠 芯片字典 (供 Docker 拉取镜像前进行精确校准)
          # ==========================================
          CHIP_DICT="
          mt7981|mt7981b|mt7981a    (mediatek-filogic)
          mt7986|mt7986a|mt7986b    (mediatek-filogic)
          mt7988|mt7988a|mt7988d    (mediatek-mt7988)
          mt7621|mt7621a|mt7621at   (ramips-mt7621)
          mt7620|mt7620a            (ramips-mt7620)
          mt7622|mt7622b            (mediatek-mt7622)
          mt7628|mt7628an           (ramips-mt76x8)
          mt7688|mt7688an           (ramips-mt76x8)
          ipq6000|ipq6018|ipq6010   (qualcomm-ipq60xx)
          ipq8071|ipq8072|ipq8074   (qualcomm-ipq807x)
          ipq8071a|ipq8070          (qualcomm-ipq807x)
          ipq4019|ipq4029           (ipq40xx-generic)
          ipq5018|ipq5000           (qualcomm-ipq50xx)
          ipq8064|ipq8065           (ipq806x-generic)
          qca9531|qca9533           (ath79-generic)
          qca9561|qca9563           (ath79-generic)
          rk3328                    (rockchip-armv8)
          rk3399                    (rockchip-armv8)
          rk3568|rk3566             (rockchip-armv8)
          rk3588|rk3588s            (rockchip-armv8)
          bcm4908|bcm4906           (bcm4908-generic)
          bcm4708|bcm4709           (bcm53xx-generic)
          s905x3|s905x4             (amlogic-meson)
          s922x                     (amlogic-meson)
          "
          
          # 执行翻译引擎
          translate_dict() {
            local input="$1"; local dict="$2"
            [ -z "$input" ] && return
            for word in $input; do
              local matched=0
              while IFS= read -r line; do
                [[ ! "$line" =~ [^[:space:]] ]] && continue
                local target=$(echo "${line##*\(}" | tr -d ')')
                local aliases_str=$(echo "${line%\(*}" | tr '[:upper:]' '[:lower:]')
                IFS='|' read -ra ALIAS_ARRAY <<< "$aliases_str"
                for raw_alias in "${ALIAS_ARRAY[@]}"; do
                  local clean_alias=$(echo "$raw_alias" | xargs)
                  if [[ "$word" == "$clean_alias" ]]; then echo "$target"; return; fi
                done
              done <<< "$dict"
            done
            echo "$input"
          }
          
          # 获取标准架构名称，确保后续 Docker 引擎能够找到对应镜像
          CLEAN_ARCH=$(translate_dict "$RAW_ARCH" "$CHIP_DICT")
          
          if [ "$CLEAN_ARCH" != "$RAW_ARCH" ]; then
            echo "💡 YAML 预处理：芯片特征 [$RAW_ARCH] 已校准为标准架构 [$CLEAN_ARCH]"
          fi

          if [ "${{ inputs.openwrt_version }}" == "Auto" ]; then
            LATEST=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=${CLEAN_ARCH}-openwrt-" | \
              jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -E "[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$" | sort -V | tail -n 1 | sed "s/${CLEAN_ARCH}-openwrt-//")
            SELECTED_VER="${LATEST:-24.10.5}"
          else
            SELECTED_VER="${{ inputs.openwrt_version }}"
          fi
          
          echo "VERSION=$SELECTED_VER" >> $GITHUB_ENV
          echo "CLEAN_ARCH=$CLEAN_ARCH" >> $GITHUB_ENV
          echo "CLEAN_PROFILE=$CLEAN_PROFILE" >> $GITHUB_ENV
          echo "CLEAN_BRAND=$CLEAN_BRAND" >> $GITHUB_ENV

      - name: 🏗️ 执行 Docker 构建引擎
        run: |
          mkdir -p bin files
          SCRIPT_PATH="./.github/scripts/build_embedded.sh"
          [ -f "$SCRIPT_PATH" ] && sed -i 's/\r$//' "$SCRIPT_PATH"
          
          # 每次运行前清理旧的报告文件
          rm -f bin/step_summary.md
          
          # 移除了那两行出错的 GITHUB_STEP_SUMMARY 映射，保持干净运行
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/.github/scripts/build_embedded.sh:/home/build/immortalwrt/build.sh" \
            -e MANAGEMENT_IP="${{ inputs.custom_router_ip }}" \
            -e TARGET_ARCH="${{ env.CLEAN_ARCH }}" \
            -e DEVICE_PROFILE="${{ env.CLEAN_PROFILE }}" \
            -e BRAND_INPUT="${{ env.CLEAN_BRAND }}" \
            -e BUILD_MODE="${{ inputs.build_mode }}" \
            immortalwrt/imagebuilder:${{ env.CLEAN_ARCH }}-openwrt-${{ env.VERSION }} \
            /bin/bash /home/build/immortalwrt/build.sh

      - name: 📢 输出编译诊断面板
        if: always() # 确保就算前面的 Docker 运行报错退出，这一步也会执行
        run: |
          if [ -f "bin/step_summary.md" ]; then
            cat bin/step_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 发布 Release
        uses: softprops/action-gh-release@v2.4.1
        if: success()
        with:
          tag_name: "${{ env.CLEAN_PROFILE }}-${{ env.VERSION }}-${{ env.CLEAN_ARCH }}"
          body: |
            ## 🛠️ 构建详情
            - **内核架构**: ${{ env.CLEAN_ARCH }}
            - **设备代号**: ${{ env.CLEAN_PROFILE }}
            - **构建模式**: **${{ inputs.build_mode }}**
            - **固件版本**: ${{ env.VERSION }}
            - **管理网址**: http://${{ inputs.custom_router_ip }}
            
            > 💡 **Extroot 扩容模式说明**: 
            > 刷入后，请在路由器**通电开机前**插上 U 盘。系统会自动将其格式化为 ext4 并挂载为系统空间，随后会自动重启一次。重启后即可拥有 U 盘的无限空间！
          files: |
            bin/targets/*/*/*.bin
            bin/targets/*/*/*.img.gz
            bin/targets/*/*/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
