name: Auto-OpenWrt-x86_64-智能自动编译发布

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 🌟 动态读取面板输入。如果是定时任务自动运行，则自动降级使用后面的默认值
  MANAGEMENT_IP: ${{ inputs.custom_ip || '192.168.100.1' }}
  ROOTFS_SIZE: ${{ inputs.profile || '1024' }}

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 版本(latest智能选择最新版本)'
        required: true
        default: 'latest'
        type: choice
        options:
          - 'latest'
          - '23.05.5'
          - '23.05.4'
          # 你可以继续在这里添加需要的具体版本号
      profile:
        description: 'RootFS 分区大小 (单位: MB)'
        required: true
        default: '1024'
        type: string
      custom_ip:
        description: '路由器管理地址 (仅填IP，无需加掩码)'
        required: true
        default: '192.168.100.1'
        type: string
  schedule:
    - cron: '0 0 * * *'

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 🔍 检测官方与本地版本是否一致
        id: check_version
        run: |
          INPUT_VER="${{ inputs.openwrt_version }}"
          EVENT_NAME="${{ github.event_name }}"
          
          # 1. 获取官方最新稳定版号 (排除 SNAPSHOT 标签)
          OFFICIAL_LATEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/openwrt/openwrt/releases" | grep '"tag_name":' | grep -v 'SNAPSHOT' | head -n 1 | cut -d '"' -f 4 | sed 's/v//')
          
          # 2. 获取本地最后发布 (兼容 rc 版本的正则匹配)
          MY_LATEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases" | grep '"name":' | grep 'OpenWrt' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?' | head -n 1 || echo "0.0.0")

          # 🌟 控制台直观日志输出
          echo "========================================"
          echo "官方最新版本: $OFFICIAL_LATEST"
          echo "本地最后发布: $MY_LATEST"
          echo "========================================"

          # 🌟 写入 GitHub Actions 首页摘要面板 (Job Summary)
          echo "### 🤖 固件版本检测摘要" >> $GITHUB_STEP_SUMMARY
          echo "| 检测项 | 版本号 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 **官方最新版本** | \`$OFFICIAL_LATEST\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏠 **本地最后发布** | \`$MY_LATEST\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY # 空行分隔

          # 3. 智能判断逻辑
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "▶️ 状态: 手动触发模式！强制执行编译。"
            echo "**▶️ 运行状态:** 手动触发，强制执行编译任务。" >> $GITHUB_STEP_SUMMARY
            echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
            if [ -z "$INPUT_VER" ] || [ "$INPUT_VER" == "latest" ]; then
              echo "OWRT_VERSION=$OFFICIAL_LATEST" >> $GITHUB_ENV
            else
              echo "OWRT_VERSION=$INPUT_VER" >> $GITHUB_ENV
            fi
          else
            if [ "$OFFICIAL_LATEST" != "$MY_LATEST" ]; then
              echo "🚀 状态: 已更新发布 ($MY_LATEST -> $OFFICIAL_LATEST)"
              echo "**🚀 运行状态:** 发现新版本 (\`$MY_LATEST\` ➔ \`$OFFICIAL_LATEST\`)，已启动更新编译！" >> $GITHUB_STEP_SUMMARY
              echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
              echo "OWRT_VERSION=$OFFICIAL_LATEST" >> $GITHUB_ENV
            else
              echo "✅ 状态: 版本一致，无需更新。任务终止。"
              echo "**✅ 运行状态:** 版本一致，无需更新。任务自动终止。" >> $GITHUB_STEP_SUMMARY
              echo "SHOULD_BUILD=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 安装编译依赖
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip bzip2 patch python3 findutils zstd

      - name: 下载并解压 ImageBuilder
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          wget -q https://downloads.openwrt.org/releases/${{ env.OWRT_VERSION }}/targets/x86/64/openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.zst
          tar -I zstd -xf openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64.tar.zst
          mv openwrt-imagebuilder-${{ env.OWRT_VERSION }}-x86-64.Linux-x86_64 imagebuilder

      - name: 运行编译脚本
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          # 🌟 核心防护：抹除 Windows 换行符
          sed -i 's/\r$//' Auto-OpenWrt-build-x86-64.sh
          
          chmod +x Auto-OpenWrt-build-x86-64.sh
          cp Auto-OpenWrt-build-x86-64.sh imagebuilder/
          cd imagebuilder
          
          # 双重防护
          sed -i 's/\r$//' Auto-OpenWrt-build-x86-64.sh
          
          ./Auto-OpenWrt-build-x86-64.sh

      - name: 生成发布时间变量
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: echo "BUILD_TIME=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

      - name: 📏 获取固件实际大小
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          # 查找生成的 img 或 img.gz 文件，取体积最大的那个计算大小
          FIRMWARE_SIZE=$(find imagebuilder/output-firmware/ -type f \( -name "*.img" -o -name "*.img.gz" \) -exec du -sh {} + | sort -hr | head -n 1 | awk '{print $1}')
          
          # 兜底逻辑：如果没匹配到特定后缀，就计算整个输出文件夹的总大小
          if [ -z "$FIRMWARE_SIZE" ]; then
            FIRMWARE_SIZE=$(du -sh imagebuilder/output-firmware/ | awk '{print $1}')
          fi
          
          echo "FIRMWARE_SIZE=$FIRMWARE_SIZE" >> $GITHUB_ENV
          echo "检测到固件实际大小为: $FIRMWARE_SIZE"
          
          # 追加编译成功信息到摘要面板
          echo "### 🎉 编译成功" >> $GITHUB_STEP_SUMMARY
          echo "- **固件体积:** \`${FIRMWARE_SIZE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **下载地址:** [👉 点击此处前往 Releases 页面下载固件](https://github.com/${{ github.repository }}/releases/tag/OpenWrt-Latest)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY


      - name: 🗑️ 清理旧的同名 Release
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        run: |
          gh release delete OpenWrt-Latest -y --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 自动发布到 Releases
        if: steps.check_version.outputs.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OpenWrt-Latest
          name: OpenWrt ${{ env.OWRT_VERSION }} 每日检测-有新版本则自动更新
          files: imagebuilder/output-firmware/*
          body: |
            **🤖 OpenWrt 最新定制化固件自动更新**
            - **构建时间**: `${{ env.BUILD_TIME }}`
            - **版    本**: `${{ env.OWRT_VERSION }}`
            - **管 理 IP**: `${{ env.MANAGEMENT_IP }}`
            - **核    心**: 已内置 OpenClash Meta 核心与 Argon 主题
            - **分区配置**: Kernel: `64MB` | RootFS: `${{ env.ROOTFS_SIZE }}MB`
            - **硬盘挂载**: 智能抓取 sda3 或 nvme0n1p3 动态绑定
            - **固件体积**: `${{ env.FIRMWARE_SIZE }}`
