name: Auto-ImmortalWrt-x86_64-智能自动编译发布

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "选择 ImmortalWrt 版本 (Auto 抓取最新稳定版/RC版)"
        required: false
        default: "Auto"
        type: choice
        options:
          - 'Auto'
          - '24.10.5'
          - '25.12.0-rc1'
      custom_router_ip:
        description: "设置路由器管理地址 (默认: 192.168.100.1)"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: '编译固件 RootFS 分区大小 (单位: MB，建议 1024 以上)'
        required: true
        default: '1024'
      pppoe_account:
        description: "PPPOE 宽带账号 (可选)"
        required: false
      pppoe_password:
        description: "宽带密码 (留空则默认为 DHCP 上网)"
        required: false
        
      # ==========================================
      # ⬇️ 模块化功能开关 (按需加载，按需配置) ⬇️
      # ==========================================
      include_docker:
        description: "🐳 集成 Docker 引擎及网络互通"
        type: boolean
        default: true
      app_homeproxy:
        description: "🛡️ 集成 HomeProxy (全能科学代理)"
        type: boolean
        default: true
      app_openclash:
        description: "🔌 集成 OpenClash (备用科学插件)"
        type: boolean
        default: false
      theme_argon:
        description: "🎨 集成 Argon 主题及控制面板"
        type: boolean
        default: true
      app_ksmbd:
        description: "📁 集成 KSMBD (局域网极速共享)"
        type: boolean
        default: true
      app_statistics:
        description: "📊 集成 Statistics (图形化状态监控)"
        type: boolean
        default: true
      app_autoreboot:
        description: "⏱️ 集成 AutoReboot (定时重启)"
        type: boolean
        default: true
      kmod_nics:
        description: "🔌 集成全套网卡驱动 (igc/ixgbe/r8169等)"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      INPUT_VERSION: ${{ github.event.inputs.luci_version }}
      INPUT_IP: ${{ github.event.inputs.custom_router_ip }}
      INPUT_ROOTFS: ${{ github.event.inputs.rootfs_size }}
      INPUT_PPPOE_ACC: ${{ github.event.inputs.pppoe_account }}
      INPUT_PPPOE_PWD: ${{ github.event.inputs.pppoe_password }}
      
      # 映射布尔值到环境变量
      INPUT_DOCKER: ${{ github.event.inputs.include_docker }}
      INPUT_APP_HOMEPROXY: ${{ github.event.inputs.app_homeproxy }}
      INPUT_APP_OPENCLASH: ${{ github.event.inputs.app_openclash }}
      INPUT_THEME_ARGON: ${{ github.event.inputs.theme_argon }}
      INPUT_APP_KSMBD: ${{ github.event.inputs.app_ksmbd }}
      INPUT_APP_STATISTICS: ${{ github.event.inputs.app_statistics }}
      INPUT_APP_AUTOREBOOT: ${{ github.event.inputs.app_autoreboot }}
      INPUT_KMOD_NICS: ${{ github.event.inputs.kmod_nics }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set executable permissions
        run: |
          sed -i 's/\r$//' ${{ github.workspace }}/x86-64/auto-build-script.sh
          chmod +x ${{ github.workspace }}/x86-64/auto-build-script.sh

      - name: Generate build timestamp
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: 🔍 解析 Auto 版本号
        id: resolve_version
        run: |
          if [ "$INPUT_VERSION" == "Auto" ]; then
            echo ">>> 正在自动抓取 Docker Hub 上最新的 ImmortalWrt 镜像标签..."
            LATEST_TAG=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=100&name=x86-64-openwrt-" | jq -r '.results[].name' | grep -v "SNAPSHOT" | grep -vE "^x86-64-openwrt-[0-9]+\.[0-9]+$" | head -n 1 | sed 's/x86-64-openwrt-//')
            
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
              echo "❌ 致命错误：未能从 Docker Hub 获取到有效的版本号！工作流中止。"
              exit 1
            fi
            
            echo ">>> 🎉 成功锁定最终构建版本: $LATEST_TAG"
            echo "FINAL_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          else
            echo ">>> 用户手动指定了版本: $INPUT_VERSION"
            echo "FINAL_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          fi

      - name: Build ImmortalWrt-x86-64-efi
        run: |
          echo "🚀 开始基于 ${{ env.FINAL_VERSION }} 构建，RootFS 大小: ${INPUT_ROOTFS}MB"
          
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/files:/home/build/immortalwrt/files" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/x86-64/auto-build-script.sh:/home/build/immortalwrt/build.sh" \
            -e CUSTOM_IP="$INPUT_IP" \
            -e ROOTFS_SIZE="$INPUT_ROOTFS" \
            -e INCLUDE_DOCKER="$INPUT_DOCKER" \
            -e PPPOE_ACCOUNT="$INPUT_PPPOE_ACC" \
            -e PPPOE_PASSWORD="$INPUT_PPPOE_PWD" \
            -e APP_HOMEPROXY="$INPUT_APP_HOMEPROXY" \
            -e APP_OPENCLASH="$INPUT_APP_OPENCLASH" \
            -e THEME_ARGON="$INPUT_THEME_ARGON" \
            -e APP_KSMBD="$INPUT_APP_KSMBD" \
            -e APP_STATISTICS="$INPUT_APP_STATISTICS" \
            -e APP_AUTOREBOOT="$INPUT_APP_AUTOREBOOT" \
            -e KMOD_NICS="$INPUT_KMOD_NICS" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.FINAL_VERSION }} /bin/bash /home/build/immortalwrt/build.sh
          
      - name: Generate Smart Release Notes
        run: |
          # 动态拼接已安装组件列表
          PLUGINS_INSTALLED=""
          [ "$INPUT_APP_HOMEPROXY" == "true" ] && PLUGINS_INSTALLED+="- \`luci-app-homeproxy\` (全能代理)\n"
          [ "$INPUT_APP_OPENCLASH" == "true" ] && PLUGINS_INSTALLED+="- \`luci-app-openclash\` (科学内核)\n"
          [ "$INPUT_THEME_ARGON" == "true" ] && PLUGINS_INSTALLED+="- \`luci-theme-argon\` (专属美化主题)\n"
          [ "$INPUT_APP_KSMBD" == "true" ] && PLUGINS_INSTALLED+="- \`luci-app-ksmbd\` (极速内网共享)\n"
          [ "$INPUT_APP_STATISTICS" == "true" ] && PLUGINS_INSTALLED+="- \`luci-app-statistics\` (图表状态监控)\n"
          [ "$INPUT_APP_AUTOREBOOT" == "true" ] && PLUGINS_INSTALLED+="- \`luci-app-autoreboot\` (定时重启防护)\n"
          [ "$INPUT_KMOD_NICS" == "true" ] && PLUGINS_INSTALLED+="- \`kmod-*虚拟与实体网卡驱动集\` (igc/ixgbe/e1000e等)\n"

          cat > ${{ github.workspace }}/router-info.md <<EOF
          ## 🚀 ImmortalWrt ${{ env.FINAL_VERSION }} 智能定制固件
          
          ## 📡 网络后台
          - 🏠 **管理地址**: \`$INPUT_IP\`
          - 👤 **默认账户**: \`root\`
          - 🔑 **默认密码**: *(无，请在初始设置时修改)*
          
          ## 🧩 已集成的自选组件与预设
          $PLUGINS_INSTALLED
          
          > 💡 **智能无痕部署**: 本固件内置了自动初始化脚本，上述选中的插件已在开机时自动注入了对应的设置（如语言包、默认配置等），首次开机生效后部署脚本会自我销毁，保障系统纯净。
          EOF

      - name: Upload ImmortWrt as release assets
        uses: softprops/action-gh-release@v2.4.1
        with:
          tag_name: Build-${{ env.DATE }}
          name: ImmortalWrt ${{ env.FINAL_VERSION }} 智能定制版 (${{ github.event.inputs.custom_router_ip }})
          body_path: ${{ github.workspace }}/router-info.md
          files: |
            ${{ github.workspace }}/bin/targets/x86/64/*-ext4-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/*-squashfs-combined-efi.img.gz
            ${{ github.workspace }}/bin/targets/x86/64/*sha256sums
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
