name: immortalwrt-build-x86-64-Docker-Deluxe

on:
  workflow_dispatch:
    inputs:
      luci_version:
        description: "ImmortalWrt 版本"
        required: false
        default: "Auto"
        type: choice
        options:
          - 'Auto'
          - '25.12.0-rc1'
          - '24.10.5'
      custom_router_ip:
        description: "管理地址"
        required: true
        default: "192.168.100.1"
      rootfs_size:
        description: 'RootFS 大小 (MB)'
        required: true
        default: '1024'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set permissions
        run: |
          chmod +x x86-64/immortalwrt-build-x86-64-Deluxe-build.sh

      - name: Generate Date
        id: date
        run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Resolve Version
        id: version
        run: |
          if [ "${{ github.event.inputs.luci_version }}" == "Auto" ]; then
            TAG=$(curl -sL "https://hub.docker.com/v2/repositories/immortalwrt/imagebuilder/tags?page_size=1&name=x86-64-openwrt-" | jq -r '.results[0].name' | sed 's/x86-64-openwrt-//')
            echo "FINAL_VERSION=$TAG" >> $GITHUB_ENV
          else
            echo "FINAL_VERSION=${{ github.event.inputs.luci_version }}" >> $GITHUB_ENV
          fi

      - name: Build Firmware
        run: |
          mkdir -p bin
          # 【關鍵修正】精準映射路徑到 /builder 確保固件回傳
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/builder/bin" \
            -v "${{ github.workspace }}/files:/builder/files" \
            -v "${{ github.workspace }}/x86-64/immortalwrt-build-x86-64-Deluxe-build.sh:/builder/build.sh" \
            -e ROOTFS_SIZE="${{ github.event.inputs.rootfs_size }}" \
            -e MANAGEMENT_IP="${{ github.event.inputs.custom_router_ip }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            immortalwrt/imagebuilder:x86-64-openwrt-${{ env.FINAL_VERSION }} /bin/bash /builder/build.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Build-${{ env.DATE }}
          name: ImmortalWrt-${{ env.FINAL_VERSION }}-J4125
          files: |
            bin/targets/x86/64/*combined-efi*.img.gz
            bin/targets/x86/64/*sha256sums
          token: ${{ secrets.GITHUB_TOKEN }}
